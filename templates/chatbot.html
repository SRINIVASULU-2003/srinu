<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot</title>
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .chatbot-container {
            width: 400px;
            height: 80%;
            max-height: 660px;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            overflow: hidden;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }
        .header {
            background-color: #CF2E2E;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 18px;
        }
        .close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff5c5c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 20px;
            line-height: 30px;
            text-align: center;
        }
        .close-button:hover {
            background-color: #ff1c1c;
        }
    </style>
</head>
<body>
    <div class="chatbot-container" id="chatbot-container">
        <div class="header">
            RedFerns Tech Assistant
        </div>
        <button class="close-button" onclick="closeChatbot()">×</button>
        <iframe src="https://srinuksv-srunu.hf.space" allowfullscreen></iframe>
    </div>

    <script>
        function closeChatbot() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
