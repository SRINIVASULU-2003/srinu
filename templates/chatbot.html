<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot</title>
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        .chatbot-container {
            width: 400px;
            height: 100%;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }
        .close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ff5c5c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 20px;
            line-height: 30px;
            text-align: center;
        }
        .close-button:hover {
            background-color: #ff1c1c;
        }
    </style>
</head>
<body>
    <div class="chatbot-container" id="chatbot-container">
        <button class="close-button" onclick="closeChatbot()">×</button>
        <iframe src="https://srinuksv-srunu.hf.space" allowfullscreen></iframe>
    </div>

    <script>
        function closeChatbot() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
