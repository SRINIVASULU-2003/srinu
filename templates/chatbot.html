<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Clera</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include Gradio CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gradio@2.0.7/dist/face.css">
    <style>
        body {
            background-color: #ea6240;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 900px;
            padding: 30px;
            background-color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .chatbot-frame {
            margin-bottom: 20px;
            border: none;
            width: 100%;
            height: 450px;
        }
        .chatbot-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .gradio-interface {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="chatbot-title">Chat with Clera</h2>
        <iframe class="chatbot-frame"
                src="https://srinuksv-srunu.hf.space"
                frameborder="0"
                allow="microphone">
        </iframe>

        <!-- Gradio Interface Container -->
        <div class="gradio-interface" id="gradio"></div>
    </div>

    <!-- Include Gradio JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gradio@2.0.7/dist/face.min.js"></script>
</body>
</html>
