<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot</title>
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .chatbot-container {
            width: 400px;
            height: 600px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            position: fixed;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            overflow: hidden;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }
        .header {
            background-color: #CF2E2E;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            position: relative;
        }
        .back-button {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="chatbot-container" id="chatbot-container">
        <div class="header">
            <button class="back-button" onclick="goBack()">&#8592;</button>
            RedFerns Tech Assistant
        </div>
        <iframe id="chatbot-iframe" allowfullscreen></iframe>
    </div>

    <script>
        function goBack() {
            window.location.href = '/';
        }

        function loadRandomChatbot() {
            const chatbots = ["Lily", "Clara"];
            const selectedChatbot = chatbots[Math.floor(Math.random() * chatbots.length)];
            const iframe = document.getElementById('chatbot-iframe');

            if (selectedChatbot === "Clara") {
                iframe.src = "https://srinuksv-srunu.hf.space";
            } else {
                iframe.src = "https://srinukethanaboina-srunu.hf.space";
            }
        }

        // Load a random chatbot when the page loads
        window.onload = loadRandomChatbot;
    </script>
</body>
</html>
