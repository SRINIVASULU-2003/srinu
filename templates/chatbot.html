<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Chatbot</title>
    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .chatbot-container {
            width: 400px;
            height: 660px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            position: fixed;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
            overflow: hidden;
        }
        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }
        .header {
            background-color: #CF2E2E;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 18px;
        }

    </style>
</head>
<body>
    <div class="chatbot-container" id="chatbot-container">
        <div class="header">
            RedFerns Tech Assistant
        </div>
        <iframe src="https://srinuksv-srunu.hf.space" allowfullscreen></iframe>
    </div>
</body>
</html>
